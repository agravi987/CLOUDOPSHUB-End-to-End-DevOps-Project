services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile

    ports:
      - "8000:8000"

    depends_on:
      - postgres

    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: cloudopshub

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:17

    environment:
      POSTGRES_DB: cloudopshub

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
